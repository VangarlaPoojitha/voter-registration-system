name: Backend CI

on:
  push:
    paths:
      - 'py1/**'
  pull_request:
    paths:
      - 'py1/**'

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: py1

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

     
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi

     
      - name: Basic dependency security (pip-audit)
        run: |
          pip install pip-audit
          pip-audit || echo "Dependency vulnerabilities found"

     
      - name: Basic code security (Bandit)
        run: |
          pip install bandit
          bandit -r . -ll || echo "Security issues found"

      - name: Done
        run: echo "Basic CI with security completed"
