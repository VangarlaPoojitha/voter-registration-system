name: Backend CI (Python)

on:
  push:
    paths:
      - 'py1/**'
  pull_request:
    paths:
      - 'py1/**'

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: py1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   # Change if needed

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping install"
          fi

      - name: Run Python Tests
        run: |
          if python -m pytest --version >/dev/null 2>&1; then
            pytest || echo "Tests failed or not found"
          else
            echo "pytest not installed. Add it to requirements.txt to enable tests."
          fi

      - name: Print Completed Message
        run: echo "Backend CI Completed (Python)"
